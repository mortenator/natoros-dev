[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "natoros"
version = "0.1.0"
description = "Python SDK for NatorOS, the agentic OS and AI OS for governed enterprise AI workers."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
keywords = ["natoros", "agentic-os", "ai-os", "ai-workers", "agents"]
dependencies = ["httpx>=0.27"]

[project.urls]
Homepage = "https://www.natoros.com"
Documentation = "https://www.natoros.com/docs/api"
Repository = "https://github.com/mortenator/natoros-dev"
